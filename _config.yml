# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
#
# Review documentation to determine if you should use `theme` or `remote_theme`
# https://mmistakes.github.io/minimal-mistakes/docs/quick-start-guide/#installing-the-theme

# Override the default Minimal Mistakes homepage


# Use your own homepage (index.md) instead of the theme demo
home:
  layout: single

minimal_mistakes_skin: "air"   # try: default, air, mint, sunrise, etc.

# -------- Site Settings --------
locale: "en-US"
title: "Dustin Cole"
title_separator: "-"
subtitle:
name: "Dustin W. Cole"
description: "Data & Analytics Leader | Automation | AI | Snowflake | Forecasting | BI"
url: "https://dcole2200.github.io"   # IMPORTANT for user sites
baseurl: ""                           # IMPORTANT for user sites
repository:
teaser:
logo:
masthead_title: ""                    # hide big title in masthead
breadcrumbs: false                    # hide breadcrumbs
words_per_minute: 200
enable_copy_code_button:
copyright:
copyright_url:

# -------- Author --------
author:
  name: "Dustin W. Cole"
  avatar:
  bio: "I build scalable analytics systems that make complex decisions simple."
  location: "Louisville, KY"
  email: "dustincole.ent@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/dustinwcole"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dcole2200"

# -------- Footer Links (remove social icons row) --------
footer:
  links: []

# -------- Reading Files --------
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -------- Conversion --------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# -------- Markdown Processing --------
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# -------- Sass --------
sass:
  sass_dir: _sass
  style: compressed

# -------- Output --------
permalink: /:categories/:title/
timezone:

# -------- Pagination --------
paginate: 5
paginate_path: /page:num/

# -------- Pagination v2 (disabled by default) --------
pagination:
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''
  trail:
    before: 2
    after: 2

# -------- Defaults (COMBINED: pages + posts) --------
defaults:
  # pages (including index.md) — clean single layout, no author box
  - scope:
      path: ""
      type: "pages"
    values:
      layout: single
      author_profile: false

  # posts (keep theme defaults in case you blog later)
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments:
      share: true
      related: true

# -------- Plugins --------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# -------- Archives (optional) --------
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# -------- HTML Compression --------
compress_html:
  clippings: all
  ignore:
    envs: development
